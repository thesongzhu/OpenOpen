name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Rust and Swift verification
    runs-on: macos-26
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"
    steps:
      - name: Check out the exact revision
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Record runner toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Install the pinned Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component rustfmt,clippy
          rustup override set 1.96.0
          rustc --version
          cargo --version

      - name: Verify Rust formatting
        run: cargo fmt --all -- --check

      - name: Test every Rust target
        run: cargo test --workspace --all-targets

      - name: Build the Rust release workspace
        run: cargo build --workspace --release

      - name: Run strict Rust lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test the Swift app and broker package with warnings as errors
        working-directory: macos/EffectBrokerBridge
        run: swift test -Xswiftc -warnings-as-errors

      - name: Build the Swift app and broker package release
        working-directory: macos/EffectBrokerBridge
        run: swift build -c release -Xswiftc -warnings-as-errors

      - name: Verify Swift formatting and LaunchDaemon metadata
        working-directory: macos/EffectBrokerBridge
        run: |
          xcrun swift-format lint --strict --recursive Sources Tests
          plutil -lint Sources/EffectBrokerBridge/Resources/LaunchDaemons/com.thesongzhu.OpenOpen.EffectBroker.plist

      - name: Verify app metadata and staging script syntax
        run: |
          plutil -lint macos/OpenOpenApp/Info.plist
          bash -n scripts/stage_openopen_app.sh

      - name: Verify checks did not rewrite tracked files
        run: git diff --exit-code
